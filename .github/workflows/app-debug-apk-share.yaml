name: App / Debug APK (Share)

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"

concurrency:
  group: debug-apk-share-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-debug-apk:
    name: Build debug APK for sharing
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version-file: .tools-versions

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Build debug APK
        run: ./gradlew clean assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p build/gh-debug-apk/
          cp app/build/outputs/apk/debug/app-debug.apk build/gh-debug-apk/
          apk_path="$(find app/build/outputs/apk -type f -name '*debug*.apk' | sort | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No debug APK found under app/build/outputs/apk"
            find app/build/outputs -type f | sort
            exit 1
          fi
          cp "$apk_path" build/gh-debug-apk/jellyfin-androidtv-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jellyfin-androidtv-debug-apk
          retention-days: 30
          if-no-files-found: error
          path: build/gh-debug-apk/app-debug.apk
          path: build/gh-debug-apk/jellyfin-androidtv-debug.apk
